name: Run Deborah Collection

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Install HTMLExtra Reporter
        run: npm install -g newman-reporter-htmlextra

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run First Postman Collection
        run: |
          newman run "JSONPlaceHolderNewman.postman_collection.json" \
          -e "JsonPlaceHolder.postman_environment.json" \
          -r htmlextra,cli \
          --delay-request 60000 \
          --reporter-htmlextra-export reports/report1.html \
          --verbose
        shell: bash

      - name: Run Second Postman Collection
        run: |
          newman run "RestfulAPINewman.postman_collection.json" \
          -e "RestfulAPINewman.postman_environment.json" \
          -r htmlextra,cli \
          --delay-request 60000 \
          --reporter-htmlextra-export reports/report2.html \
          --verbose
        shell: bash

      - name: Upload HTML Reports
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
          retention-days: 7
